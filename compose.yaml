# docker-compose.yml — MicroBank (desarrollo local)
#
# Uso:
#   docker-compose up -d          → levanta en background
#   docker-compose logs -f        → sigue los logs
#   docker-compose down -v        → para y borra volúmenes
#
# Con spring-boot-docker-compose en el classpath,
# Spring Boot 3.1+ levanta esto automáticamente en dev.
# No hace falta correr docker-compose manualmente.

services:

  postgres:
    image: postgres:16-alpine
    # Usamos 16-alpine (más liviana que la imagen full).
    # PostgreSQL 16 es compatible con Flyway 10.x y TestContainers.
    container_name: microbank-postgres

    environment:
      POSTGRES_DB: microbank
      POSTGRES_USER: microbank
      POSTGRES_PASSWORD: changeme
      # En producción estas variables vendrían de un Secret Manager.
      # Para dev local, están hardcodeadas intencionalmente.

    ports:
      - target: 5432
        published: 5432
        protocol: tcp
        mode: host
      # Solo exponer el puerto en dev. En producción,
      # la app accede por red interna Docker, sin exponer 5432.

    volumes:
      - postgres_data:/var/lib/postgresql/data
      # Volumen nombrado: los datos persisten entre reinicios del container.
      # Sin esto, cada `docker-compose down` borra la BD.

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U microbank -d microbank"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 15s
      # Spring Boot espera a que el healthcheck sea healthy
      # antes de intentar conectarse (requiere spring-boot-docker-compose).

    restart: unless-stopped

volumes:
  postgres_data:
    name: microbank_postgres_data
    # Nombre explícito para evitar colisiones con otros proyectos.