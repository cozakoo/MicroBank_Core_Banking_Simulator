services:
  # PostgreSQL 15 database service
  postgres:
    image: postgres:15
    container_name: microbank-db
    environment:
      POSTGRES_USER: microbank
      POSTGRES_PASSWORD: changeme
      POSTGRES_DB: microbank
    ports:
      - "5432:5432"
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U microbank -d microbank" ]
      interval: 10s
      timeout: 5s
      retries: 5
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-scripts:/docker-entrypoint-initdb.d
    networks:
      - microbank-network

  pgadmin:
    image: dpage/pgadmin4
    container_name: microbank-pgadmin
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@microbank.com
      PGADMIN_DEFAULT_PASSWORD: admin
    ports:
      - "5050:80"
    depends_on:
      - postgres
    networks:
      - microbank-network

  # Spring Boot MicroBank Application service
  microbank-app:
    build: .
    container_name: microbank-application
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/microbank
      - SPRING_DATASOURCE_USERNAME=microbank
      - SPRING_DATASOURCE_PASSWORD=changeme
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - microbank-network

networks:
  microbank-network:
    driver: bridge

volumes:
  postgres_data: