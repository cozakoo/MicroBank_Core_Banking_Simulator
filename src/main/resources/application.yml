spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/microbank}
    username: ${SPRING_DATASOURCE_USERNAME:microbank}
    password: ${SPRING_DATASOURCE_PASSWORD:changeme}
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: ${SPRING_JPA_HIBERNATE_DDL_AUTO:validate}
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect
  flyway:
    enabled: true
    locations: classpath:db/migration

springdoc:
  swagger-ui:
    enabled: true
    path: /swagger-ui.html
    tagsSorter: alpha
    operationsSorter: alpha
    displayOperationId: true
    defaultModelsExpandDepth: 1
    defaultModelExpandDepth: 1
  api-docs:
    path: /v3/api-docs
  show-actuator: false

jwt:
  secret: ${JWT_SECRET:bXljc2VjcmV0a2V5bXljc2VjcmV0a2V5bXljc2VjcmV0a2V5bXljc2VjcmV0}
  expiration: ${JWT_EXPIRATION:86400000}

logging:
  level:
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
    org.springframework.transaction: DEBUG
    org.hibernate.engine.transaction: DEBUG
    com.microbank: DEBUG